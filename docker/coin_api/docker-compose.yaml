services:
  postgres:
    image: postgres:latest
    env_file:
      - .env
    container_name: postgres
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  crypto_etl:
    build: .
    container_name: crypto_etl
    depends_on:
      postgres:
        condition: service_healthy
